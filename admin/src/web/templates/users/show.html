{% extends "base_show.html" %}

{% block title %}
    Perfil de {{ user.alias }}
{% endblock %}


	{% block content %}
	<h1>Perfil de {{ user.alias }}</h1>
    <div>
        <p><strong>Nombre:</strong> {{ user.alias }}</p>
        <p><strong>Email:</strong> {{ user.email }}</p>
        <p><strong>Rol:</strong> {{ user.role.name }}</p>
        <p><strong>Activo:</strong> {{ 'Sí' if user.active else 'No' }}</p>
    </div>

    <div>
        <a href="{{ url_for('users.index') }}">Volver a la lista</a>
    </div>
	{% endblock %}
