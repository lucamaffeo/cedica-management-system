{% extends "layout.html" %}
{% block title %}Login{% endblock %}
{% block head %}
{{ super() }}
{% endblock %}
{% block content %}
<section>
    <h1>Iniciar sesión</h1>
    <form action="{{ url_for('auth.authenticate') }}" method="POST">
        <input name="email" placeholder="a@a.com" required>
        <input type="password" name="password" placeholder="contraseña" required>
        <input type="submit" value="Login">
    </form>

	<div class="separator">
        <span>o</span>
    </div>

    <!-- Google login form -->
    <form method="GET" action="{{ url_for('auth.google_login') }}" class="google-login-form">
        <input type="email" name="email" placeholder="Ingrese su correo electrónico" required>
        <button type="submit" class="btn btn-google">
            <img src="{{ url_for('static', filename='img/google-icon.svg') }}" alt="Google Icon">
            Continuar con Google
        </button>
    </form>

</section>
{% endblock %}
