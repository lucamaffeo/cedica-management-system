{% extends "base_form.html" %}

{% block form_action %}
{{ url_for('horses.update', id=horse.id) if horse else url_for('horses.create') }}
{% endblock %}

{% block form_fields %}
        <label class="form-label" for="name">Nombre:</label>
        <input class="form-control" type="text" name="name" value="{{ horse.name if horse else '' }}" required>

        <label class="form-label" for="birth_date">Fecha de Nacimiento:</label>
        <input class="form-control" type="date" name="birth_date" value="{{ horse.birth_date.strftime('%Y-%m-%d') if horse else '' }}">

        <label class="form-label" for="gender">Sexo:</label>
        <select class="form-control" name="gender">
            <option value="">Seleccionar</option>
            <option value="Male" {{ 'selected' if horse and horse.gender=='Male' else '' }}>Macho</option>
            <option value="Female" {{ 'selected' if horse and horse.gender=='Female' else '' }}>Hembra</option>
        </select>
 

        <label class="form-label" for="breed">Raza:</label>
        <input class="form-control" type="text" name="breed" value="{{ horse.breed if horse else '' }}">

        <label class="form-label" for="coat">Pelaje:</label>
        <input class="form-control" type="text" name="coat" value="{{ horse.coat if horse else ''}}">

        <label class="form-label" for="purchase_donation">Compra/Donación:</label>
        <select class="form-control" name="purchase_donation" required>
            <option value="Purchase" {{ 'selected' if horse and horse.purchase_donation=='Purchase' else '' }}>Compra</option>
            <option value="Donation" {{ 'selected' if horse and horse.purchase_donation=='Donation' else '' }}>Donación</option>
        </select>

        <label class="form-label"  for="entry_date">Fecha de Ingreso:</label>
        <input class="form-control" type="date" id="entry_date" name="entry_date"
         value="{{ horse.entry_date.strftime('%Y-%m-%d') if horse and horse.entry_date else '' }}"
            required>
        
        <label class="form-label" for="assigned_location">Sede Asignada:</label>
        <input class="form-control"  type="text" name="assigned_location" value="{{ horse.assigned_location if horse else '' }}">

        <label class="form-label" for="trainer_id">Entrenador:</label>
        <select class="form-control" name="trainer_id">
            <option value="">Seleccionar</option>
            {% for trainer in trainers %}
            <option value="{{ trainer.id }}" {% if trainer.id == horse.trainer_id %}selected{% endif %}>{{ trainer.name }} {{ trainer.surname }} - Puesto laboral: {{ trainer.job_position}}</option>
            {% else %}
            <option value="">No hay entrenadores disponibles</option> <!-- Mensaje alternativo -->
            {% endfor %}
        </select>

        <label class="form-label" for="assigned_activities_ja">Tipo de J&A Asignados:</label>
        <select class="form-control" name="assigned_activities_ja">
            <option value="">Seleccionar</option>
            <option value="Hippotherapy" {{ 'selected' if horse and horse.assigned_activities_ja =="Hippotherapy" else '' }}>Hipoterapia
            </option>
            <option value="Therapeutic Riding" {{ 'selected' if horse and horse.assigned_activities_ja =="Therapeutic Riding" else '' }}>
                Monta Terapéutica</option>
            <option value="Adaptive Equestrian Sport" {{ 'selected' if horse and horse.assigned_activities_ja =="Adaptive Equestrian Sport" else '' }}>Deporte Ecuestre Adaptado</option>
            <option value="Recreational Activities" {{ 'selected' if horse and horse.assigned_activities_ja =="Recreational Activities" else '' }}>Actividades Recreativas</option>
            <option value="Equitation" {{ 'selected' if horse and horse.assigned_activities_ja =="Equitation" else '' }}>Equitación
            </option>
        </select>

{% endblock %}
