<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if is_update %}Actualizar{% else %}Crear{% endif %} Empleado</title>
</head>

<body>
    <h1>{% if is_update %}Actualizar{% else %}Crear{% endif %} Empleado</h1>
    <form action="{{ url_for('employees.create') }}" method="POST">
        <div>
            <label for="name">Nombre:</label>
            <input type="text" id="name" name="name" required>
        </div>

        <div>
            <label for="surname">Apellido:</label>
            <input type="text" id="surname" name="surname" required>
        </div>

        <div>
            <label for="dni">DNI:</label>
            <input type="text" id="dni" name="dni" required>
        </div>

        <div>
            <label for="address">Domicilio:</label>
            <input type="text" id="address" name="address" required>
        </div>

        <div>
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>
        </div>

        <div>
            <label for="city">Localidad:</label>
            <input type="text" id="city" name="city" required>
        </div>

        <div>
            <label for="telephone">Teléfono:</label>
            <input type="text" id="telephone" name="telephone" required>
        </div>

        <div>
            <label for="profession">Profesión:</label>
            <select id="profession" name="profession" required>
                <option value="Psicólogo/a">Psicólogo/a</option>
                <option value="Psicomotricista">Psicomotricista</option>
                <option value="Médico/a">Médico/a</option>
                <option value="Kinesiólogo/a">Kinesiólogo/a</option>
                <option value="Terapista Ocupacional">Terapista Ocupacional</option>
                <option value="Psicopedagogo/a">Psicopedagogo/a</option>
                <option value="Docente">Docente</option>
                <option value="Profesor">Profesor</option>
                <option value="Fonoaudiólogo/a">Fonoaudiólogo/a</option>
                <option value="Veterinario/a">Veterinario/a</option>
                <option value="Otro">Otro</option>
            </select>
        </div>

        <div>
            <label for="job_position">Puesto Laboral:</label>
            <select id="job_position" name="job_position" required>
                <option value="Administrativo/a">Administrativo/a</option>
                <option value="Terapeuta">Terapeuta</option>
                <option value="Conductor">Conductor</option>
                <option value="Auxiliar de pista">Auxiliar de pista</option>
                <option value="Herrero">Herrero</option>
                <option value="Veterinario">Veterinario</option>
                <option value="Entrenador de Caballos">Entrenador de Caballos</option>
                <option value="Domador">Domador</option>
                <option value="Profesor de Equitación">Profesor de Equitación</option>
                <option value="Docente de Capacitación">Docente de Capacitación</option>
                <option value="Auxiliar de mantenimiento">Auxiliar de mantenimiento</option>
                <option value="Otro">Otro</option>
            </select>
        </div>

        <div>
            <label for="start_date">Fecha de Inicio:</label>
            <input type="date" id="start_date" name="start_date" required>
        </div>

        <div>
            <label for="termination_date">Fecha de Cese:</label>
            <input type="date" id="termination_date" name="termination_date">
        </div>

        <div>
            <label for="emergency_contact">Contacto de Emergencia:</label>
            <input type="text" id="emergency_contact" name="emergency_contact" required>
        </div>

        <div>
            <label for="emergency_telephone">Teléfono de Emergencia:</label>
            <input type="text" id="emergency_telephone" name="emergency_telephone" required>
        </div>

        <div>
            <label for="social_work">Obra Social:</label>
            <input type="text" id="social_work" name="social_work">
        </div>

        <div>
            <label for="associate_number">N° de Afiliado:</label>
            <input type="text" id="associate_number" name="associate_number">
        </div>

        <div>
            <label for="condition">Condición:</label>
            <select id="condition" name="condition" required>
                <option value="Voluntario">Voluntario</option>
                <option value="Personal Rentado">Personal Rentado</option>
            </select>
        </div>

        <div>
            <label for="active">Activo:</label>
            <input type="checkbox" id="active" name="active" value="true" checked>
        </div>

        <button type="submit">{% if is_update %}Actualizar{% else %}Crear{% endif %}</button>
    </form>

    {% with messages = get_flashed_messages() %}
    {% if messages %}
    <ul>
        {% for message in messages %}
        <li>{{ message }}</li>
        {% endfor %}
    </ul>
    {% endif %}
    {% endwith %}
</body>

</html>
